<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Administrace - Útulek Tlapka</title>
    <!-- Bootstrap pro responzivní design ze cvičení 3[cite: 7] -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Chart.js pro vizualizaci dat ze cvičení 8[cite: 6] -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script defer src="admin.js"></script>
    <style>
        body { background-color: #f8f9fa; }
        /* Skryjeme admin obsah, dokud neproběhne přihlášení[cite: 5] */
        #adminContent { display: none; }
    </style>
</head>
<body>

    <!-- 1. PŘIHLAŠOVACÍ SEKCE[cite: 5] -->
    <div id="loginSection" class="container mt-5" style="max-width: 400px;">
        <div class="card shadow border-0 rounded-4 mt-5">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">🐾 Přihlášení do adminu</h3>
                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold">Přihlašovací jméno</label>
                        <input type="text" id="adminUser" class="form-control" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted small fw-bold">Heslo</label>
                        <input type="password" id="adminPass" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold py-2">Přihlásit se</button>
                </form>
            </div>
        </div>
        <div class="text-center mt-3">
            <a href="index.html" class="text-muted text-decoration-none">← Zpět na veřejný web</a>
        </div>
    </div>

    <!-- 2. HLAVNÍ ADMINISTRAČNÍ SEKCE[cite: 5] -->
    <div id="adminContent">
        <!-- Navigace[cite: 5] -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
            <div class="container">
                <a class="navbar-brand fw-bold" href="#">🐾 Útulek Admin Panel</a>
                <div class="ms-auto">
                    <a href="index.html" class="btn btn-outline-light btn-sm">Odejít na web</a>
                </div>
            </div>
        </nav>

        <div class="container mb-5">
            <div class="row g-4">
                
                <!-- LEVÝ SLOUPEC: Formulář pro přidávání a úpravu mazlíčků (Create/Update)[cite: 8] -->
                <div class="col-lg-4">
                    <div class="card shadow-sm border-0">
                        <div class="card-header bg-primary text-white">
                            <h5 class="mb-0">Správa mazlíčka</h5>
                        </div>
                        <div class="card-body">
                            <form id="addAnimalForm">
                                <!-- Skryté ID pro režim úprav[cite: 8] -->
                                <input type="hidden" id="editId">
                                
                                <div class="mb-3">
                                    <label class="form-label fw-bold small text-muted">Jméno</label>
                                    <input type="text" id="name" class="form-control" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-bold small text-muted">Druh / Plemeno</label>
                                    <input type="text" id="species" class="form-control" placeholder="např. Pes / Zlatý retrívr" required>
                                </div>
                                <div class="row">
                                    <div class="col-6 mb-3">
                                        <label class="form-label fw-bold small text-muted">Věk (roky)</label>
                                        <input type="number" id="age" class="form-control" required>
                                    </div>
                                    <div class="col-6 mb-3">
                                        <label class="form-label fw-bold small text-muted">V útulku od:</label>
                                        <input type="date" id="dateArrived" class="form-control" required>
                                    </div>
                                </div>
                                
                                <!-- Nahrávání souboru pro fotku[cite: 7] -->
                                <div class="mb-3">
                                    <label class="form-label fw-bold small text-muted">Fotografie (nahrát soubor)</label>
                                    <input type="file" id="photoFile" class="form-control" accept="image/*" required>
                                    <div id="photoPreview" class="mt-2 text-center" style="display:none;">
                                        <img id="previewImg" src="" style="max-height: 120px; object-fit: cover;" class="rounded border shadow-sm w-100">
                                    </div>
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label fw-bold small text-muted">Popis</label>
                                    <textarea id="description" class="form-control" rows="3" required></textarea>
                                </div>
                                
                                <!-- Tlačítka pro formulář[cite: 8] -->
                                <button type="submit" id="submitBtn" class="btn btn-primary w-100 fw-bold">Uložit do databáze</button>
                                <button type="button" id="cancelEdit" class="btn btn-secondary w-100 mt-2" style="display:none;" onclick="resetForm()">Zrušit úpravu</button>
                                
                                <hr class="my-4">
                                <!-- Testovací data (Normální rozdělení) -->
                                <button type="button" class="btn btn-outline-warning w-100 btn-sm" onclick="generateNormalDistributionData()">
                                    ⚙️ Vygenerovat testovací data
                                </button>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- PRAVÝ SLOUPEC: Tabulky a Statistiky -->
                <div class="col-lg-8">
                    
                    <!-- 1. Nové žádosti o adopci[cite: 8] -->
                    <div class="card shadow-sm border-0 mb-4">
                        <div class="card-header bg-warning">
                            <h5 class="mb-0 text-dark fw-bold">🔔 Nové žádosti o adopci</h5>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover align-middle mb-0">
                                    <thead class="table-light">
                                        <tr>
                                            <th>Zájemce</th>
                                            <th>Kontakt</th>
                                            <th class="text-end">Rozhodnutí</th>
                                        </tr>
                                    </thead>
                                    <tbody id="admin-adoptions-list">
                                        <!-- Žádosti se načtou sem přes admin.js -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <!-- 2. Grafy[cite: 6] -->
                    <div class="card shadow-sm border-0 mb-4">
                        <div class="card-header bg-white">
                            <h5 class="mb-0 fw-bold">📈 Statistiky útulku</h5>
                        </div>
                        <div class="card-body">
                            <div class="row">
                                <div class="col-md-6 mb-3 mb-md-0">
                                    <canvas id="speciesChart"></canvas>
                                </div>
                                <div class="col-md-6">
                                    <canvas id="ageChart"></canvas>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 3. Seznam zvířat v evidenci[cite: 8] -->
                    <div class="card shadow-sm border-0">
                        <div class="card-header bg-white">
                            <h5 class="mb-0 fw-bold">📋 Seznam zvířat v evidenci</h5>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover align-middle mb-0">
                                    <thead class="table-light">
                                        <tr>
                                            <th>Foto</th>
                                            <th>Zvíře</th>
                                            <th>Druh</th>
                                            <th>Věk</th>
                                            <th class="text-end">Akce</th>
                                        </tr>
                                    </thead>
                                    <tbody id="admin-animal-list">
                                        <!-- Zvířata se načtou sem přes admin.js -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap skripty[cite: 7] -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
