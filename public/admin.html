<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Admin - Útulek</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script defer src="admin.js"></script>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2>Přidat nového mazlíčka</h2>
        <form id="addAnimalForm" class="bg-white p-4 shadow-sm mb-5">
            <input type="text" id="name" class="form-control mb-2" placeholder="Jméno zvířete" required>
            <input type="number" id="age" class="form-control mb-2" placeholder="Věk" required>
            <input type="url" id="photo" class="form-control mb-2" placeholder="URL odkaz na fotografii" required>
            <textarea id="description" class="form-control mb-2" rows="3" placeholder="Popis..." required></textarea>
            <button type="submit" class="btn btn-primary">Přidat do databáze</button>
            <button type="button" class="btn btn-warning ms-2" onclick="generateNormalDistributionData()">Generovat testovací data</button>
        </form>

        <h2>Správa mazlíčků</h2>
        <table class="table bg-white shadow-sm">
            <thead><tr><th>Fotka</th><th>Jméno</th><th>Věk</th><th>Akce</th></tr></thead>
            <tbody id="admin-animal-list"></tbody>
        </table>
    </div>
</body>
</html>
