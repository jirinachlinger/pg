<!DOCTYPE html>
<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Útulek pro mazlíčky</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script defer src="app.js"></script>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h1 class="text-center mb-5">Naši mazlíčci k adopci</h1>
        <div id="animal-list" class="row"></div>
    </div>

    <!-- Vyskakovací okno (Modal) pro adopci -->
    <div class="modal fade" id="adoptModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Žádost o adopci</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="adoptForm">
                        <input type="hidden" id="adoptAnimalId">
                        <div class="mb-3"><label>Jméno</label><input type="text" id="firstName" class="form-control" required></div>
                        <div class="mb-3"><label>Příjmení</label><input type="text" id="lastName" class="form-control" required></div>
                        <div class="mb-3"><label>Pohlaví</label>
                            <select id="gender" class="form-select" required>
                                <option value="Muž">Muž</option><option value="Žena">Žena</option><option value="Jiné">Jiné</option>
                            </select>
                        </div>
                        <div class="mb-3"><label>Adresa</label><input type="text" id="address" class="form-control" required></div>
                        <div class="mb-3"><label>Telefonní číslo</label><input type="tel" id="phone" class="form-control" required></div>
                        <button type="submit" class="btn btn-success w-100">Odeslat žádost</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
