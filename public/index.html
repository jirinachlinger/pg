<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Útulek Tlapka - Mazlíčci k adopci</title>
    <!-- Bootstrap pro design ze cvičení 3[cite: 7] -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script defer src="app.js"></script>
    <style>
        .card-img-top { height: 250px; object-fit: cover; }
        .description-truncate { height: 3em; overflow: hidden; transition: height 0.3s; }
    </style>
</head>
<body class="bg-light">
    <!-- Jednotná navigace s odkazem na Administraci -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">🐾 Útulek Tlapka</span>
            <div class="ms-auto">
                <a href="admin.html" class="btn btn-outline-light btn-sm">Administrace</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1 class="text-center mb-5">Najděte si nového přítele</h1>
        <div id="animal-list" class="row">
            <!-- Mazlíčci se načtou sem přes app.js[cite: 3, 5] -->
            <div class="text-center">
                <div class="spinner-border text-primary" role="status"></div>
                <p>Hledáme chlupáče v databázi...</p>
            </div>
        </div>
    </div>

    <!-- Modal pro adopci[cite: 5, 7] -->
    <div class="modal fade" id="adoptModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Žádost o adopci</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="adoptForm">
                        <input type="hidden" id="adoptAnimalId">
                        <div class="mb-3"><label class="form-label">Jméno</label><input type="text" id="firstName" class="form-control" required></div>
                        <div class="mb-3"><label class="form-label">Příjmení</label><input type="text" id="lastName" class="form-control" required></div>
                        <div class="mb-3">
                            <label class="form-label">Pohlaví</label>
                            <select id="gender" class="form-select">
                                <option value="Muž">Muž</option>
                                <option value="Žena">Žena</option>
                            </select>
                        </div>
                        <div class="mb-3"><label class="form-label">Adresa</label><input type="text" id="address" class="form-control" required></div>
                        <div class="mb-3"><label class="form-label">Telefon</label><input type="tel" id="phone" class="form-control" required></div>
                        <button type="submit" class="btn btn-success w-100">Odeslat závaznou žádost</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
